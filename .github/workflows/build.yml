name: Build and Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            ext: '.exe'
          - os: ubuntu-latest
            ext: ''
          - os: macos-latest
            ext: ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build for Windows
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --onefile --name "TankBattle-Windows" main.py
        shell: bash

      - name: Build for Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          pyinstaller --onefile --name "TankBattle-Linux" main.py

      - name: Build for macOS
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller --onefile --name "TankBattle-macOS" main.py

      - name: Create archive for Windows
        if: matrix.os == 'windows-latest'
        run: powershell -Command "Compress-Archive -Path 'dist/TankBattle-Windows.exe' -DestinationPath 'TankBattle-Windows.zip'; Write-Output 'artifact=TankBattle-Windows.zip' | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append"

      - name: Create archive for Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          tar -czvf "TankBattle-Linux.tar.gz" -C dist TankBattle-Linux
          echo "artifact=TankBattle-Linux.tar.gz" >> $GITHUB_ENV
        shell: bash

      - name: Create archive for macOS
        if: matrix.os == 'macos-latest'
        run: |
          tar -czvf "TankBattle-macOS.tar.gz" -C dist TankBattle-macOS
          echo "artifact=TankBattle-macOS.tar.gz" >> $GITHUB_ENV
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: ${{ env.artifact }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f -exec sha256sum {} \; > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*
            artifacts/**/checksums.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}